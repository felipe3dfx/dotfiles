# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,2
monitor=DP-1,2560x1440@144,0x0,1

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=mDP-1,preferred,auto,1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2

# Monitor secundario Dell U2415 (DP-3) configurado en modo portrait (vertical).
# transform,1 = 90° horario  → cable/botón abajo-izquierda, resolución efectiva 1200x1920
# transform,3 = 90° antihorario → cable/botón abajo-derecha, resolución efectiva 1200x1920
monitor=DP-3,1920x1200@59.95,2560x0,1,transform,1

# Workspaces dedicados por monitor (no se comparten)
# DP-1 (BenQ): workspaces 1-5  →  SUPER+1 a SUPER+5
# DP-3 (Dell): workspaces 6-10 →  SUPER+6 a SUPER+0
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-3, default:true
workspace = 7, monitor:DP-3
workspace = 8, monitor:DP-3
workspace = 9, monitor:DP-3
workspace = 10, monitor:DP-3
